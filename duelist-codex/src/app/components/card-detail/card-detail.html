<div class="overlay" [routerLink]="['/']">
  <div class="modal" (click)="$event.stopPropagation()">
    <button class="close-btn" [routerLink]="['/']" aria-label="Cerrar">✕</button>

    @if (error()) {
      <p class="status error">{{ error() }}</p>
    }

    @if (card(); as card) {
      <div class="layout">
        <img [src]="card.imageUrl" [alt]="card.name" />

        <div class="info">
          <h2>{{ card.name }}</h2>
          <p class="type">{{ card.type }}</p>

          <app-tabs [tabs]="tabs" />

          <router-outlet />
        </div>
      </div>
    }
  </div>
</div>
